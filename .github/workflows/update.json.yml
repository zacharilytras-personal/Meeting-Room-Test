name: Update JSON

on:
  repository_dispatch:
    types: [update]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Write JSON (force diff)
        run: |
          echo '${{ toJson(github.event.client_payload) }}' > room-status-v2.json

      - name: Show written file (debug)
        run: |
          echo "===== room-status-v2.json ====="
          cat room-status-v2.json
          echo "================================"

      - name: Commit JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update room status (parent flow)"
          file_pattern: room-status-v2.json
